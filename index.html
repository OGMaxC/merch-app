<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Doomherre Merch</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/global.css"/>
</head>
<body>

<div class="app-shell">

  <nav class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-band">Doomherre</span>
      <span class="logo-sub">merch</span>
    </div>
    <ul class="nav-list">
      <li><a class="nav-item active" href="/" data-page="dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a></li>
      <li><a class="nav-item" href="/inventory" data-page="inventory">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-6 9 6v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Inventory
      </a></li>
      <li><a class="nav-item" href="/shows" data-page="shows">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Shows
      </a></li>
      <li><a class="nav-item" href="/investment" data-page="investment">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        Investment
      </a></li>
      <li><a class="nav-item" href="/reports" data-page="reports">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Reports
      </a></li>
      <li><a class="nav-item" href="/designs" data-page="designs">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Design planner
      </a></li>
    </ul>
  </nav>

  <main class="main-area" id="main-area">
    <div id="page-content"></div>
  </main>

</div>

<!-- MODAL CONTAINER -->
<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="/js/firebase.js"></script>
<script src="/js/helpers.js"></script>
<script src="/js/router.js"></script>
<script src="/js/pages/dashboard.js"></script>
<script src="/js/pages/inventory.js"></script>
<script src="/js/pages/shows.js"></script>
<script src="/js/pages/investment.js"></script>
<script src="/js/pages/reports.js"></script>
<script src="/js/pages/designs.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
